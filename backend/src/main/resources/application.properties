# =========================================================
# Convergente Regional DAU DSSM
# Configuracion base para produccion DSSM / desarrollo local
# =========================================================

server.port=${SERVER_PORT:8086}

spring.application.name=convergente-regional-dau

# Base de datos creada en MySQL
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:convergente_dau_dssm_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Santiago
spring.datasource.username=${DB_USER:convergente_dau_user}
spring.datasource.password=${DB_PASS:ConvergenteDau2026*}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Desarrollo: update. Produccion recomendada: validate una vez estabilizado el esquema.
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT: cambiar obligatoriamente en produccion.
app.jwt.secret=${JWT_SECRET:CAMBIAR_ESTE_SECRETO_DE_AL_MENOS_64_CARACTERES_EN_PRODUCCION_2026}
app.jwt.expiration-minutes=480

# API Key de integracion Hospital Clinico / ambientes controlados.
app.integration.api-key-hcm=${DAU_API_KEY_HCM:CAMBIAR_API_KEY_HCM}

# CORS frontend Angular.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://convergente.dssm.cl,http://convergente.dssm.cl,http://localhost:4200,http://127.0.0.1:4200,http://10.8.74.156,https://10.8.74.156}

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html
