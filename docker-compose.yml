services:
  mysql:
    image: mysql:8.0
    container_name: convergente_dau_dssm_mysql
    environment:
      MYSQL_DATABASE: convergente_dau_dssm_db
      MYSQL_USER: convergente_dau_user
      MYSQL_PASSWORD: ConvergenteDau2026*
      MYSQL_ROOT_PASSWORD: root123
    ports:
      - "3306:3306"
    volumes:
      - convergente_dau_mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

volumes:
  convergente_dau_mysql_data:
